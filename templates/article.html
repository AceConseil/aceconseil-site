<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · ACE Conseil</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">
<link rel="canonical" href="{{CANONICAL}}">
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL}}">
<meta property="og:image" content="https://aceconseil.co/og-image.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231B2A4A'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23C9A24D' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script type="application/ld+json">{{JSONLD}}</script>
<style>
:root{
  --navy:#1B2A4A; --navy-deep:#111D33; --navy-mid:#243558;
  --gold:#C9A24D; --gold-light:#E2C47A; --gold-pale:rgba(201,162,77,.12);
  --cream:#FEFDFB; --cream-dark:#F4F1EB;
  --muted:#7A8499; --muted-light:#A8B0C0;
  --border:rgba(27,42,74,.1); --border-gold:rgba(201,162,77,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--cream);color:var(--navy);line-height:1.75;-webkit-font-smoothing:antialiased}
::selection{background:var(--gold);color:var(--navy-deep)}
a{color:inherit}
img{max-width:100%}
.wrap{width:min(1180px,92%);margin:0 auto}
.nav{background:var(--navy-deep);height:76px;display:flex;align-items:center}
.nav .wrap{display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{display:flex;align-items:baseline;gap:10px;text-decoration:none;color:var(--cream)}
.logo-ace{font-family:'Playfair Display',serif;font-weight:700;font-size:1.5rem;letter-spacing:.02em}
.logo-sep{width:1px;height:20px;background:var(--gold);align-self:center}
.logo-conseil{font-size:.72rem;font-weight:500;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:26px}
.nav-back{font-size:.88rem;color:var(--muted-light);text-decoration:none;transition:color .3s}
.nav-back:hover{color:var(--gold-light)}
.nav-tel{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-weight:500;font-size:.88rem;color:var(--navy-deep);background:var(--gold);padding:10px 18px;border-radius:100px;transition:background .3s}
.nav-tel:hover{background:var(--gold-light)}
.nav-tel svg{width:14px;height:14px}
.hero{background:var(--navy-deep);color:var(--cream);padding:clamp(60px,8vw,100px) 0}
.eyebrow{font-size:12px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:14px}
.eyebrow::before{content:"";width:34px;height:1px;background:var(--gold)}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:clamp(2rem,4.4vw,3.2rem);line-height:1.15;margin:22px 0 0;max-width:24ch}
.hero-meta{margin-top:22px;font-size:.86rem;color:var(--muted-light);letter-spacing:.06em}
.article{padding:clamp(60px,8vw,100px) 0 clamp(80px,10vw,120px)}
.article-body{max-width:68ch;font-size:1.04rem}
.article-body h2{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:1.65rem;line-height:1.25;margin:48px 0 16px}
.article-body h3{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:1.25rem;margin:36px 0 12px}
.article-body p{margin:16px 0;color:var(--navy);opacity:.87}
.article-body a{color:var(--gold);text-decoration:none;border-bottom:1px solid var(--border-gold)}
.article-body a:hover{color:var(--navy)}
.article-body ul,.article-body ol{margin:16px 0 16px 22px}
.article-body li{margin:8px 0;opacity:.87}
.article-body strong{font-weight:500}
.article-body blockquote{border-left:2px solid var(--gold);padding-left:18px;margin:24px 0;font-family:'Playfair Display',Georgia,serif;font-style:italic;color:var(--navy-mid)}
.article-body code{font-family:ui-monospace,Menlo,monospace;font-size:.9em;background:var(--cream-dark);padding:2px 6px;border-radius:4px}
.article-body pre{background:var(--navy-deep);color:var(--cream);padding:18px;overflow-x:auto;margin:20px 0;border-radius:6px}
.article-body pre code{background:none;padding:0;color:inherit}
.article-foot{max-width:68ch;margin-top:56px;padding-top:32px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;justify-content:space-between;gap:18px;align-items:center}
.back-link{font-size:.92rem;font-weight:500;color:var(--gold);text-decoration:none;border-bottom:1px solid var(--border-gold);padding-bottom:3px}
.back-link:hover{color:var(--navy)}
.btn{display:inline-flex;align-items:center;gap:11px;padding:14px 26px;border-radius:100px;text-decoration:none;font-weight:500;font-size:.94rem;background:var(--gold);color:var(--navy-deep);transition:background .3s}
.btn:hover{background:var(--gold-light)}
.btn svg{width:15px;height:15px}
.footer{background:var(--navy-deep);color:var(--muted-light);border-top:1px solid rgba(201,162,77,.14);padding:44px 0}
.footer .wrap{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px}
.footer-legal{font-size:.82rem}
.footer-links{display:flex;gap:26px;font-size:.85rem}
.footer-links a{text-decoration:none;color:var(--muted-light);transition:color .3s}
.footer-links a:hover{color:var(--gold-light)}
@media(max-width:640px){.nav-back{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="logo" href="/" aria-label="ACE Conseil, retour à l'accueil">
      <span class="logo-ace">ACE</span><span class="logo-sep"></span><span class="logo-conseil">Conseil</span>
    </a>
    <div class="nav-right">
      <a class="nav-back" href="/blog">← Tous les articles</a>
      <a class="nav-tel" href="tel:+33665704793" data-tel-reveal aria-label="Afficher le numéro puis appeler">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.13.96.36 1.9.7 2.8a2 2 0 0 1-.45 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.25a2 2 0 0 1 2.1-.45c.9.34 1.84.57 2.8.7A2 2 0 0 1 22 16.9z"/></svg>
        <span class="tel-label">Appeler</span>
      </a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <p class="eyebrow">Blog · ACE Conseil</p>
    <h1>{{TITLE}}</h1>
    <p class="hero-meta"><time datetime="{{DATE_ISO}}">{{DATE_FR}}</time> · ACE Conseil</p>
  </div>
</header>

<main class="article">
  <div class="wrap">
    <div class="article-body">
{{CONTENT}}
    </div>
    <div class="article-foot">
      <a class="back-link" href="/blog">← Tous les articles</a>
      <a class="btn" href="/#contact">Parler de votre situation
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="wrap">
    <a class="logo" href="/" aria-label="ACE Conseil">
      <span class="logo-ace" style="font-size:1.15rem">ACE</span><span class="logo-sep" style="height:15px"></span><span class="logo-conseil" style="font-size:.62rem">Conseil</span>
    </a>
    <p class="footer-legal">ACE Conseil SAS · SIRET 999&nbsp;417&nbsp;967&nbsp;00018 · Marne-la-Vallée · © 2026</p>
    <nav class="footer-links">
      <a href="/blog">Blog</a>
      <a href="tel:+33665704793" data-tel-reveal aria-label="Afficher le numéro puis appeler"><span class="tel-label">Appeler</span></a>
      <a href="mailto:contact@aceconseil.co">contact@aceconseil.co</a>
      <a href="/mentions-legales">Mentions légales</a>
    </nav>
  </div>
</footer>

<script>
/* Le numéro n'apparaît qu'au clic ; sans JavaScript le lien appelle directement. */
(function(){
  document.querySelectorAll("[data-tel-reveal]").forEach(function(a){
    a.addEventListener("click", function(ev){
      if(a.getAttribute("data-revealed")){ return; }
      ev.preventDefault();
      a.setAttribute("data-revealed","1");
      var t = a.querySelector(".tel-label") || a;
      var d = a.getAttribute("data-tel-reveal") || "06 65 70 47 93";
      t.textContent = d.replace(/ /g, "\u00A0");
    });
  });
})();
</script>
</body>
</html>
